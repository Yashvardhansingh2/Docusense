name: DocuSense CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: postgresql://admin:admin123@localhost:5432/docusense
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_SERVICE_KEY: fake-key
          SUPABASE_BUCKET: docusense-files
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SECRET_KEY: ci-test-key
        run: |
          cd backend
          pytest tests/ -v --tb=short

      - name: Build Docker image
        run: docker build -t docusense-api ./backend

      - name: Confirm image built
        run: docker images | grep docusense-api
