services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app   # live reload during development
    depends_on:
      - localdb
      - localredis
    restart: unless-stopped

  # Local Postgres with pgvector — only used for local dev
  # In production, DATABASE_URL points to Supabase
  localdb:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: docusense
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # Local Redis — only used for local dev
  # In production, swap for Upstash URLs in .env
  localredis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
